<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Boards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    /* Fixed overlay header */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1050;
      background: rgba(248, 249, 250, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 0.5rem 1rem;
    }
    /* Push content below the fixed header */
    #boardRoot { padding-top: 56px; min-height: 100vh; }

    /* Scale down markdown headings inside cards to stay in proportion with card body text */
    .lc-result h1 { font-size: 1rem;   font-weight: 700; margin: 0.5rem 0 0.25rem; }
    .lc-result h2 { font-size: 0.9rem; font-weight: 700; margin: 0.5rem 0 0.25rem; border-bottom: 1px solid #dee2e6; padding-bottom: 0.1rem; }
    .lc-result h3 { font-size: 0.85rem; font-weight: 600; margin: 0.4rem 0 0.2rem; }
    .lc-result p  { font-size: 0.8rem; margin: 0 0 0.25rem; }
    .lc-result ul, .lc-result ol { font-size: 0.8rem; margin: 0 0 0.25rem; padding-left: 1.2rem; }
    .lc-result li { margin-bottom: 0.15rem; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsonata/jsonata.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yaml-flow@5.4.2/browser/card-compute.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yaml-flow@5.4.2/browser/live-cards.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yaml-flow@5.4.2/browser/board-livegraph-engine.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yaml-flow@5.4.2/browser/board-livecards-runtime-client.js"></script>
</head>
<body class="bg-light">
  <div id="topBar" class="d-flex flex-wrap align-items-center justify-content-between gap-2">
    <div>
      <h1 class="h5 mb-0" id="boardTitle">Live Boards</h1>
    </div>
    <div class="d-flex align-items-center gap-2">
      <select id="boardKeySelect" class="form-select form-select-sm" style="width: auto;"></select>
      <div class="btn-group btn-group-sm" role="group" aria-label="View mode">
        <button class="btn btn-outline-primary active" id="modeBoard">Board</button>
        <button class="btn btn-outline-primary" id="modeCanvas">Canvas</button>
      </div>
      <button class="btn btn-sm btn-outline-secondary" id="devModeToggle">Dev Mode</button>
      <button class="btn btn-sm btn-outline-secondary ms-1" id="refreshBtn" title="Refresh all boards (upsert + restart)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 1 1 .908-.418A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966a.25.25 0 0 1 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="boardRoot">
    <div class="container-fluid">
      <div class="d-flex align-items-center justify-content-center" style="height: 90vh;">
        <div class="text-center">
          <div class="spinner-border mb-3" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="text-muted">Initializing board...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // Guard: the runtime client's SSE handler calls buildLiveCardModelsFromArtifacts
      // on every SSE message.  When the server poll hits an error it sends { error: "…" }
      // which has no cardDefinitions → returns [] → syncBoardNodes removes all nodes →
      // blank board.  Wrap the function so error/empty payloads return the last known
      // good result instead of an empty array.
      const _origBuild = window.BoardLiveGraph && window.BoardLiveGraph.buildLiveCardModelsFromArtifacts;
      let _lastGoodNodes = null;
      const buildLiveCardModelsFromArtifacts = function (payload) {
        if (!payload || payload.error || !Array.isArray(payload.cardDefinitions) || payload.cardDefinitions.length === 0) {
          console.warn('[sse-guard] skipping non-card payload:', payload && payload.error ? payload.error : '(no cardDefinitions)');
          return _lastGoodNodes || [];
        }
        _lastGoodNodes = _origBuild(payload);
        return _lastGoodNodes;
      };
      if (window.BoardLiveGraph) {
        window.BoardLiveGraph.buildLiveCardModelsFromArtifacts = buildLiveCardModelsFromArtifacts;
      }

      let currentMode = localStorage.getItem('demo-board-mode') || 'board';
      let devMode = localStorage.getItem('demo-board-devmode') === 'true';
      let bootstrapCompleted = false;
      let activeBoardId = 'default';
      let runtimeClient = null;

      const _params = new URLSearchParams(window.location.search);
      let boardKey = _params.get('l') || '';

      function boardPaths(boardId) {
        const b = encodeURIComponent(boardId || activeBoardId || 'default');
        const base = `/api/${encodeURIComponent(boardKey)}/${b}`;
        return {
          initBoard: `${base}/init-board`,
          bootstrapCards: `${base}/bootstrap-cards`,
          bootstrap: `${base}/bootstrap`,
          stream: `${base}/sse`,
          patchCard: function (id) { return `${base}/cards/${encodeURIComponent(id)}`; },
          cardAction: function (id) { return `${base}/cards/${encodeURIComponent(id)}/actions`; },
          cardFile: function (id) { return `${base}/cards/${encodeURIComponent(id)}/files`; },
          cardChats: function (id) { return `${base}/cards/${encodeURIComponent(id)}/chats`; },
        };
      }

      function localServerOrigins() {
        const params = new URLSearchParams(window.location.search || '');
        const fromQuery = params.get('demoServerOrigin');
        const fromWindow = window.DEMO_SERVER_ORIGIN;
        const hostPref = window.location.hostname === 'localhost' ? 'localhost' : '127.0.0.1';
        const hostAlt = hostPref === 'localhost' ? '127.0.0.1' : 'localhost';
        const defaults = [
          `http://${hostPref}:7799`,
          `http://${hostAlt}:7799`,
        ];

        const unique = [];
        const push = (v) => {
          if (!v || typeof v !== 'string') return;
          if (unique.includes(v)) return;
          unique.push(v);
        };

        push(fromWindow);
        push(fromQuery);
        defaults.forEach(push);
        return unique;
      }

      let activeServerOrigin = null;

      async function fetchServer(path, init) {
        const origins = activeServerOrigin ? [activeServerOrigin] : localServerOrigins();
        const failures = [];

        for (const origin of origins) {
          const url = `${origin}${path}`;
          try {
            const res = await fetch(url, init);
            activeServerOrigin = origin;
            return res;
          } catch (err) {
            failures.push(`${url} -> ${String(err && err.message || err)}`);
          }
        }

        const tip = 'Start the API bridge from the yaml-flow folder: node examples/example-board/demo-server.js';
        throw new Error(`Unable to reach example-board demo server. Tried: ${failures.join(' | ')}. ${tip}`);
      }

      // Apply persisted UI state to toolbar before bootstrap
      function syncModeButtons(mode) {
        var boardBtn = document.getElementById('modeBoard');
        var canvasBtn = document.getElementById('modeCanvas');
        boardBtn.classList.toggle('active', mode === 'board');
        canvasBtn.classList.toggle('active', mode === 'canvas');
      }
      function syncDevModeButton(on) {
        var btn = document.getElementById('devModeToggle');
        btn.classList.toggle('active', on);
        btn.classList.toggle('btn-outline-secondary', !on);
        btn.classList.toggle('btn-secondary', on);
      }
      syncModeButtons(currentMode);
      syncDevModeButton(devMode);

      runtimeClient = window.ReusableBoardRuntimeClient.createBoardRuntimeClient({
        fetchServer,
        boardPaths,
        buildLiveCardModelsFromArtifacts,
        getServerOrigin: function () { return activeServerOrigin; },
        initialMode: currentMode,
        canvas: { height: 'calc(100vh - 56px)', overflow: 'auto' },
      });

      // Populate board selector from server config
      async function loadConfig() {
        try {
          var res = await fetchServer('/api/config');
          var boards = await res.json();
          if (!Array.isArray(boards) || !boards.length) return;
          // Default to first board if ?l= not set
          if (!boardKey) {
            boardKey = boards[0].key;
          }
          var select = document.getElementById('boardKeySelect');
          boards.forEach(function (b) {
            var opt = document.createElement('option');
            opt.value = b.key;
            opt.textContent = b.label || b.key;
            if (b.key === boardKey) opt.selected = true;
            select.appendChild(opt);
          });
          select.addEventListener('change', function () {
            var url = new URL(window.location);
            url.searchParams.set('l', this.value);
            window.location.href = url.toString();
          });
          var match = boards.find(function (b) { return b.key === boardKey; });
          if (match) {
            document.getElementById('boardTitle').textContent = match.label || match.key;
          }
        } catch (e) { /* selector stays empty if config unavailable */ }
      }

      function resolveTaskExecutorPathParam() {
        const params = new URLSearchParams(window.location.search || '');
        const fromQuery = params.get('taskExecutorPath');
        const fromWindow = window.DEMO_TASK_EXECUTOR_PATH;
        if (typeof fromQuery === 'string' && fromQuery.trim()) return fromQuery.trim();
        if (typeof fromWindow === 'string' && fromWindow.trim()) return fromWindow.trim();
        return '';
      }

      async function bootstrap(boardId) {
        const bid = boardId || activeBoardId || 'default';

        await runtimeClient.bootstrapBoard({
          boardId: bid,
          taskExecutorPath: resolveTaskExecutorPathParam(),
          rootElement: document.getElementById('boardRoot'),
          runDemoSetup: false,
          mode: currentMode,
        });

        bootstrapCompleted = true;
        if (devMode) runtimeClient.setDevMode(true);
      }

      document.getElementById('modeBoard').addEventListener('click', function () {
        currentMode = 'board';
        localStorage.setItem('demo-board-mode', 'board');
        syncModeButtons('board');
        runtimeClient.setMode('board');
      });

      document.getElementById('modeCanvas').addEventListener('click', function () {
        currentMode = 'canvas';
        localStorage.setItem('demo-board-mode', 'canvas');
        syncModeButtons('canvas');
        runtimeClient.setMode('canvas');
      });

      document.getElementById('devModeToggle').addEventListener('click', function () {
        devMode = !devMode;
        localStorage.setItem('demo-board-devmode', String(devMode));
        syncDevModeButton(devMode);
        runtimeClient.setDevMode(devMode);
      });

      document.getElementById('refreshBtn').addEventListener('click', async function () {
        var btn = this;
        btn.disabled = true;
        btn.classList.replace('btn-outline-secondary', 'btn-warning');
        try {
          var res = await fetchServer('/api/refresh', { method: 'POST' });
          var data = await res.json();
          console.log('[refresh]', data);
          btn.classList.replace('btn-warning', 'btn-success');
          setTimeout(function () { btn.classList.replace('btn-success', 'btn-outline-secondary'); }, 2000);
        } catch (err) {
          console.error('[refresh] error:', err);
          btn.classList.replace('btn-warning', 'btn-danger');
          setTimeout(function () { btn.classList.replace('btn-danger', 'btn-outline-secondary'); }, 3000);
        } finally {
          btn.disabled = false;
        }
      });

      async function start() {
        await loadConfig();
        await bootstrap(activeBoardId);
      }

      start().catch(function (err) {
        console.error(err);
        document.getElementById('boardRoot').innerHTML =
          `<div class="alert alert-danger">Failed to start server runtime demo: ${String(err && err.message || err)}</div>`;
      });

      window.addEventListener('beforeunload', function () {
        runtimeClient.dispose();
      });
    })();
  </script>
</body>
</html>
